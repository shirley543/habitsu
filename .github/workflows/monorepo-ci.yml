name: Monorepo CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  workspace-ci:
    name: CI for ${{ matrix.workspace }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace: [apps/client, apps/backend, packages/validation-schemas]
      fail-fast: false
    env:
      NODE_OPTIONS: "--max-old-space-size=4096 --enable-source-maps"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        if: ${{ matrix.workspace == 'apps/backend' }}
        working-directory: ${{ matrix.workspace }}
        run: npx prisma generate

      - name: Run linting
        working-directory: ${{ matrix.workspace }}
        run: npm run lint:check

      - name: Run formatting
        working-directory: ${{ matrix.workspace }}
        run: npm run format:check

      - name: Run tests
        working-directory: ${{ matrix.workspace }}
        run: npm run test
        continue-on-error: true
