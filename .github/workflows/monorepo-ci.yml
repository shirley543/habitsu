name: Monorepo CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  workspace-ci:
    name: CI for ${{ matrix.workspace }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace: [apps/client, apps/backend, packages/validation-schemas]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint -w ${{ matrix.workspace }}

      - name: Run formatting
        run: npm run format -w ${{ matrix.workspace }}

      - name: Run tests
        run: npm run test -w ${{ matrix.workspace }}
        continue-on-error: true
